[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[functions]
  directory = "netlify/functions/"
  # Netlify Pro max synchronous is 26s; Free is 10s.
  # 鋒兄新聞 scrapes many locked sources — pair with REQUEST_BUDGET_MS in news.ts.
  timeout = 26

# 訂閱到期 Web Push：每天 09:00 UTC 執行
[functions."send-push-cron"]
  schedule = "0 9 * * *"

# Netlify Blobs 重定向規則
[[redirects]]
  from = "/api/blobs/*"
  to = "/.netlify/functions/blob-proxy"
  status = 200

# 快取設定
[[headers]]
  for = "/api/blobs/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"