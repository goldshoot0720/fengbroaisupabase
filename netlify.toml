[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[functions]
  directory = "netlify/functions/"

# Daily Web Push for subscription expiry (09:00 UTC)
[functions."send-push-cron"]
  schedule = "0 9 * * *"

# Netlify Blobs proxy
[[redirects]]
  from = "/api/blobs/*"
  to = "/.netlify/functions/blob-proxy"
  status = 200

# Cache headers for blob API
[[headers]]
  for = "/api/blobs/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"
